apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kube-prometheus-stack-tinyrack-server-rules
  namespace: kube-prometheus-stack-system
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: tinyrack-server.control-plane
      rules:
        - alert: TinyrackServerKubeAPIDown
          expr: up{job="apiserver"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Kubernetes API target is down
            description: Prometheus cannot scrape the Kubernetes API server target for more than 5 minutes.
    - name: tinyrack-server.gitops
      rules:
        - alert: TinyrackServerFluxKustomizationNotReady
          expr: gotk_reconcile_condition{kind="Kustomization",type="Ready",status="False"} == 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Flux Kustomization {{ $labels.namespace }}/{{ $labels.name }} is not ready
            description: Flux has reported the Kustomization as not ready for more than 10 minutes.
        - alert: TinyrackServerFluxHelmReleaseNotReady
          expr: gotk_reconcile_condition{kind="HelmRelease",type="Ready",status="False"} == 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Flux HelmRelease {{ $labels.namespace }}/{{ $labels.name }} is not ready
            description: Flux has reported the HelmRelease as not ready for more than 10 minutes.
    - name: tinyrack-server.node
      rules:
        - alert: TinyrackServerHighMemoryPressure
          expr: 1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 0.9
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: Node {{ $labels.instance }} memory usage is above 90%
            description: Available memory has been below 10% for more than 15 minutes.
        - alert: TinyrackServerNodeFilesystemAlmostFull
          expr: |
            (
              node_filesystem_avail_bytes{fstype!~"tmpfs|overlay",mountpoint!~"/run.*|/var/lib/kubelet/pods.*"}
              /
              node_filesystem_size_bytes{fstype!~"tmpfs|overlay",mountpoint!~"/run.*|/var/lib/kubelet/pods.*"}
            ) < 0.10
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: Node filesystem {{ $labels.instance }} {{ $labels.mountpoint }} is below 10% free
            description: The filesystem has less than 10% available space for more than 15 minutes.
        - alert: TinyrackServerNodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: Node {{ $labels.node }} is not Ready
            description: Kubernetes reports node {{ $labels.node }} as not Ready for more than 10 minutes.
    - name: tinyrack-server.longhorn
      rules:
        - alert: TinyrackServerLonghornVolumeUnhealthy
          expr: longhorn_volume_robustness != 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Longhorn volume {{ $labels.volume }} is not healthy
            description: Longhorn reports volume robustness as {{ $labels.robustness }} for more than 10 minutes.
    - name: tinyrack-server.certificates
      rules:
        - alert: TinyrackServerCertificateExpiringSoon
          expr: certmanager_certificate_expiration_timestamp_seconds - time() < 14 * 24 * 60 * 60
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: Certificate {{ $labels.name }} expires soon
            description: cert-manager reports certificate {{ $labels.namespace }}/{{ $labels.name }} expires in less than 14 days.
    - name: tinyrack-server.blackbox
      rules:
        - alert: TinyrackServerBlackboxProbeFailed
          expr: probe_success{job="probe/kube-prometheus-stack-system/tinyrack-server-http-endpoints"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Blackbox probe failed for {{ $labels.instance }}
            description: The public tinyrack endpoint probe has failed for more than 5 minutes.
