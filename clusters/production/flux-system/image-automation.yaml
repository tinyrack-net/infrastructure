apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: tinyauth
  namespace: flux-system
spec:
  image: ghcr.io/tinyrack-net/tinyauth
  interval: 5m
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: tinyauth
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: tinyauth
  filterTags:
    pattern: '^v?(?P<version>[0-9]+\.[0-9]+\.[0-9]+)$'
    extract: '$version'
  policy:
    semver:
      range: '>=0.0.0 <1.0.0'
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageUpdateAutomation
metadata:
  name: tinyauth
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        name: flux-image-automation
        email: flux-image-automation@users.noreply.github.com
      messageTemplate: |
        chore(images): update tinyauth

        {{ range .Changed.Changes -}}
        - {{ .OldValue }} -> {{ .NewValue }}
        {{ end -}}
    push:
      branch: main
  update:
    path: ./apps/base/tinyauth
    strategy: Setters
