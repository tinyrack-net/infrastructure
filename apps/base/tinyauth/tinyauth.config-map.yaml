apiVersion: v1
kind: ConfigMap
metadata:
  name: tinyauth-config
  namespace: tinyauth-system
data:
  config.yaml: |
    server:
      public_origin: https://auth.tinyrack.net
      listen_port: 8080
      trust_proxy: true

    frontend:
      enabled: true
      mode: static
      path: /opt/tinyauth/frontend
      html_variables:
        APP_NAME: TinyAuth

    logging:
      level: info
      format: json

    database:
      type: postgres
      host: tinyauth-database-cluster-rw.tinyauth-system.svc.cluster.local
      port: 5432
      user: ${TINYAUTH_DATABASE_USER}
      password: ${TINYAUTH_DATABASE_PASSWORD}
      name: tinyauth

    security:
      session_secret: ${TINYAUTH_SESSION_SECRET}
      hash_secret: ${TINYAUTH_HASH_SECRET}

    email:
      transport: smtp
      host: mail.winetree94.com
      port: 465
      secure: true
      user: ${TINYAUTH_SMTP_USER}
      password: ${TINYAUTH_SMTP_PASSWORD}
      from: noreply@tinyrack.net

    registration:
      enabled: true
      allowed_email_patterns: []
      email_verification_required: true

    auth:
      password:
        enabled: true
        two_factor:
          enrollment_required: true
        totp:
          enabled: true
      passkey:
        enabled: true

    terms: []

    identity_providers:
      - id: google
        type: google
        enabled: true
        display_name: Google
        client_id: ${TINYAUTH_GOOGLE_CLIENT_ID}
        client_secret: ${TINYAUTH_GOOGLE_CLIENT_SECRET}
        email_conflict_strategy: auto_link
      - id: github
        type: github
        enabled: true
        display_name: GitHub
        client_id: ${TINYAUTH_GITHUB_CLIENT_ID}
        client_secret: ${TINYAUTH_GITHUB_CLIENT_SECRET}
        email_conflict_strategy: auto_link
      - id: apple
        type: apple
        enabled: true
        display_name: Apple
        client_id: ${TINYAUTH_APPLE_CLIENT_ID}
        client_secret: ${TINYAUTH_APPLE_CLIENT_SECRET}
        email_conflict_strategy: auto_link

    clients:
      - id: discourse
        name: Discourse
        client_id: discourse
        client_secret: ${TINYAUTH_DISCOURSE_CLIENT_SECRET}
        redirect_uris:
          - https://forum.tinyrack.net/auth/oidc/callback
        response_types:
          - code
        grant_types:
          - authorization_code
          - refresh_token
        scope: openid profile email
